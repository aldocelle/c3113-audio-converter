server {
    # Railway injects $PORT; the nginx:alpine entrypoint substitutes it.
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for any unknown path so client-side
    # routing works on refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
